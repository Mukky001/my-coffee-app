apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-app
  labels:
    app: coffee-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: coffee-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: coffee-app
            port:
              number: 80